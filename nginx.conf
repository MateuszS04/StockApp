events {
    worker_connections 1024;
 }

http {
     upstream stockapp_backends{
              server stockapp1:8081 max_fails=2 fail_timeout=10s;
              server stockapp2:8082 max_fails=2 fail_timeout=10s;
     }
     server {
            listen 80;

            location / {
                        proxy_pass http://stockapp_backends;

                        proxy_set_header Host $host;
                        proxy_set_header X-Reak-IP $remote_addr;
                        proxy_set_header X-Forwarded-for $proxy_add_x_forwarded_for;
                        proxy_set_header X-Frowarder-Proto $scheme;

                        proxy_connect_timeout 2s;
                        proxy_read_timeout 30s;
                        proxy_send_timeout 30s;

                        proxy_next_upstream error timeout http_502 http_503  http_504;
                        proxy_next_upstream_tries 2;
            }
     }
}