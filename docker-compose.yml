services:
  redis:
    image: redis:7-alpine
    container_name: stockapp-redis
    # Enable AOF persistence so the bank/wallet state in Redis survives
    # restarts the same way the Postgres audit log does. Without this,
    # restarting docker compose left audit rows referring to bank/wallet
    # state that no longer existed.
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: stockapp-postgres
    environment:
      POSTGRES_DB: stocks
      POSTGRES_USER: stocks
      POSTGRES_PASSWORD: stocks
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "stocks", "-d", "stocks"]
      interval: 5s
      timeout: 3s
      retries: 2

  stockapp1:
    build: .
    container_name: stockapp-1
    command: ["8081"]
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/stocks
      SPRING_DATASOURCE_USERNAME: stocks
      SPRING_DATASOURCE_PASSWORD: stocks
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  stockapp2:
    build: .
    container_name: stockapp-2
    command: ["8082"]
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/stocks
      SPRING_DATASOURCE_USERNAME: stocks
      SPRING_DATASOURCE_PASSWORD: stocks
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: stockapp-nginx
    ports:
      - "${PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - stockapp1
      - stockapp2
volumes:
  pg_data:
  redis_data: