spring:
  application:
    name: stock-app

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/stocks}
    username: ${SPRING_DATASOURCE_USERNAME:stocks}
    password: ${SPRING_DATASOURCE_PASSWORD:stocks}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

  jackson:
    mapper:
      accept-case-insensitive-enums: true

  threads: #enabling virtual threads for handling the multiple requests efficiently
    virtual:
      enabled: true

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics